version: "3.9"

services:

  postgres:
    image: postgres:16-alpine

    container_name: leetcode-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leetcode

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: leetcode-backend

    restart: unless-stopped

    depends_on:
      - postgres

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: leetcode

    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend

    container_name: leetcode-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "80:80"

volumes:
  postgres_data: